name: .NET Core Desktop

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # Install the .NET SDK
      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'   # FIXED (see explanation below)

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore
